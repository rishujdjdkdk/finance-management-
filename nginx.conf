          <span class="txn-amount">&#8722; &#8377;340</span>
        </div>
        <div class="demo-txn">
          <div class="txn-left">
            <span class="txn-icon travel">&#128652;</span>
            <div>
              <div class="txn-name">Metro Recharge</div>
              <div class="txn-meta">Travel &nbsp;&middot;&nbsp; <span class="txn-platform paytm">Paytm</span></div>
            </div>
          </div>
          <span class="txn-amount">&#8722; &#8377;200</span>
        </div>
        <div class="demo-txn">
          <div class="txn-left">
            <span class="txn-icon shop">&#128722;</span>
            <div>
              <div class="txn-name">Amazon Order</div>
              <div class="txn-meta">Shopping &nbsp;&middot;&nbsp; <span class="txn-platform card">Card</span></div>
            </div>
          </div>
          <span class="txn-amount">&#8722; &#8377;700</span>
        </div>
        <div class="demo-date-label">Yesterday &#8212; 15 March 2026</div>
        <div class="demo-txn">
          <div class="txn-left">
            <span class="txn-icon food">&#9749;</span>
            <div>
              <div class="txn-name">Cafe Coffee Day</div>
