        <span class="demo-platform-chip">GPay</span>
        <span class="demo-platform-chip">PhonePe</span>
        <span class="demo-platform-chip">Paytm</span>
        <span class="demo-platform-chip">Card</span>
        <span class="demo-platform-chip">Cash</span>
      </div>

      <!-- Transaction list -->
