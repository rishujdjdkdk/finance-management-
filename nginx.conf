            </div>
          </div>
          <span class="txn-amount">&#8722; &#8377;180</span>
        </div>
        <div class="demo-txn">
          <div class="txn-left">
            <span class="txn-icon cash">&#128181;</span>
            <div>
              <div class="txn-name">Auto Rickshaw</div>
              <div class="txn-meta">Travel &nbsp;&middot;&nbsp; <span class="txn-platform cash">Cash</span></div>
            </div>
          </div>
          <span class="txn-amount">&#8722; &#8377;80</span>
        </div>
      </div>

      <div class="demo-coming-badge">&#128640; Full dashboard coming soon</div>
