          <button class="demo-chip">1 Year</button>
          <button class="demo-chip">Custom</button>
        </div>
      </div>

      <!-- KPI Cards -->
      <div class="demo-kpis">
        <div class="demo-kpi">
          <span class="kpi-label">Total Spent Today</span>
          <span class="kpi-value">&#8377;1,240</span>
